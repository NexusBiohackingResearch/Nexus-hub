<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#03070b">
  <title>Mon compte — NEXUS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/store.css">
  <meta name="description" content="Mon compte — NEXUS Biohacking Research, peptides de recherche haute pureté.">
  <link rel="canonical" href="https://www.nexus-research-shop.com/compte.html">
  <meta name="robots" content="noindex,follow">
  <script src="/js/analytics.js"></script>
  <script src="/js/age-gate.js"></script>
</head>
<body>
  <canvas id="ambientCanvas" aria-hidden="true"></canvas>
  <header class="header">
    <a class="brand" href="index.html"><span class="brand-mark"></span><span>NEXUS</span><small>Biohacking Research</small></a>
    <div class="header-actions">
      <a class="button button-secondary" href="index.html" style="min-height:auto;padding:10px 14px;font-size:11px">← Boutique</a>
      <button class="button button-secondary" id="logoutBtn" style="min-height:auto;padding:10px 14px;font-size:11px;display:none">Déconnexion</button>
    </div>
  </header>

  <style>
    .profile-card{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:22px}
    .avatar{width:64px;height:64px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
      font-family:'Space Grotesk';font-weight:700;font-size:24px;color:#04120c;
      background:linear-gradient(135deg,#83ef68,#18d7e8,#9b47ff)}
    .profile-meta h2{font-family:'Space Grotesk';font-size:22px;margin:0 0 2px}
    .profile-meta .pm-email{color:var(--muted);font-size:14px}
    .profile-meta .pm-since{color:#66757f;font-size:12px;margin-top:4px}
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 34px}
    .stat{border:1px solid var(--line);border-radius:16px;padding:16px 18px;background:linear-gradient(150deg,rgba(9,20,30,.6),rgba(3,9,14,.5))}
    .stat .v{font-family:'Space Grotesk';font-weight:700;font-size:26px;line-height:1}
    .stat .l{color:var(--muted);font-size:12px;margin-top:6px}
    .oc-detail{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;font-size:13px;color:var(--muted)}
    .oc-detail .row{display:flex;justify-content:space-between;padding:3px 0}
    .oc-pay{display:flex;justify-content:center;width:100%;margin-top:12px;min-height:auto;padding:11px 12px;font-size:13px}
    .oc-cancel{display:block;width:100%;margin-top:10px;padding:9px 12px;font-size:12px;border-radius:12px;
      background:transparent;border:1px solid rgba(237,133,133,.35);color:#ed8585;cursor:pointer;transition:.15s}
    .oc-cancel:hover{background:rgba(237,133,133,.08);border-color:rgba(237,133,133,.6)}
    .oc-cancel:disabled{opacity:.5;cursor:default}
    .section-title{font-family:'Space Grotesk';font-size:20px;margin:10px 0 18px}
    @media(max-width:560px){.stats-row{grid-template-columns:1fr 1fr}}
  </style>
  <main class="page">
    <div id="guestView" style="display:none">
      <h1>Mon compte</h1>
      <p class="lead">Connecte-toi pour voir ton historique de commandes, ou suis une commande avec ta référence.</p>
      <div class="panel" style="max-width:460px">
        <button class="button button-primary" id="openAuthBtn" style="width:100%">Se connecter / Créer un compte</button>
        <div style="margin:22px 0 10px;text-align:center;color:#66757f;font-size:12px">— ou suivre une commande invité —</div>
        <div class="field"><label>Référence (NX-XXXXXX)</label><input id="t_ref"></div>
        <div class="field"><label>Email de la commande</label><input id="t_email" type="email"></div>
        <p class="form-msg" id="t_msg"></p>
        <button class="button button-secondary" id="trackBtn" style="width:100%">Suivre ma commande</button>
        <div id="trackResult" style="margin-top:18px"></div>
      </div>
    </div>

    <div id="userView" style="display:none">
      <h1 id="hello">Mon compte</h1>
      <p class="lead" id="userSub"></p>

      <div class="panel" style="margin-bottom:28px">
        <div class="profile-card">
          <div class="avatar" id="pfAvatar">N</div>
          <div class="profile-meta">
            <h2 id="pfName">—</h2>
            <div class="pm-email" id="pfEmail"></div>
            <div class="pm-since" id="pfSince"></div>
          </div>
        </div>
        <div class="stats-row">
          <div class="stat"><div class="v" id="stOrders">0</div><div class="l">Commandes</div></div>
          <div class="stat"><div class="v" id="stSpent">0 €</div><div class="l">Total réglé</div></div>
          <div class="stat"><div class="v" id="stPending">0</div><div class="l">En attente</div></div>
        </div>
      </div>

      <h3 class="section-title">Mes commandes</h3>
      <div id="ordersList"></div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script>
    const STATUS_LABEL = {
      awaiting_payment:"En attente de paiement", payment_received:"Paiement reçu",
      shipped:"Expédiée", cancelled:"Annulée"
    };
    const euro = (n)=>`${Number(n||0).toFixed(2)} €`;
    const esc = (s="")=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
    function orderCard(o){
      const statusTxt = o.statusLabel || STATUS_LABEL[o.status] || o.status;
      // détail des articles avec quantité et prix
      const lines = (o.items||[]).map(i=>
        `<div class="row"><span>${esc(i.name)} <span style="color:#66757f">× ${i.quantity}</span></span><span>${euro(i.unit_price*i.quantity)}</span></div>`
      ).join("");
      const shipping = Number(o.shipping)>0 ? `<div class="row"><span>Livraison</span><span>${euro(o.shipping)}</span></div>` : "";
      const discount = Number(o.discount)>0 ? `<div class="row"><span>Remise${o.promo_code?` (${esc(o.promo_code)})`:""}</span><span>−${euro(o.discount)}</span></div>` : "";
      // bouton payer si en attente + lien de paiement dispo
      const pay = (o.status==="awaiting_payment" && o.btcpay_checkout_link)
        ? `<a class="button button-primary oc-pay" href="${o.btcpay_checkout_link}">Payer maintenant →</a>` : "";
      // bouton annuler tant que la commande est en attente de paiement
      const cancel = (o.status==="awaiting_payment")
        ? `<button class="oc-cancel" data-ref="${o.reference}">Annuler la commande</button>` : "";
      // suivi colis
      const track = o.trackingUrl
        ? `<a class="button button-secondary" href="${o.trackingUrl}" target="_blank" rel="noopener" style="display:flex;margin-top:12px;width:100%;min-height:auto;padding:9px 12px;font-size:12px;justify-content:center">📦 Suivre mon colis${o.carrier?` — ${esc(o.carrier)}`:""} →</a>`
        : (o.tracking?`<div style="margin-top:8px;font-size:12px;color:var(--cyan)">Suivi : ${esc(o.tracking)}${o.carrier?` (${esc(o.carrier)})`:""}</div>`:"");
      return `<div class="order-card">
        <div class="oc-head">
          <span class="ref">${o.reference}</span>
          <span class="status-pill status-${o.status}">${statusTxt}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted)">
          <span>${new Date(o.created_at).toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"})}</span>
          <b style="font-family:'Space Grotesk';color:#eafcff;font-size:15px">${euro(o.total)}</b>
        </div>
        <div class="oc-detail">${lines}${shipping}${discount}</div>
        ${pay}
        ${track}
        ${cancel}
      </div>`;
    }
    function renderStats(orders){
      const paid = orders.filter(o=>o.status==="payment_received"||o.status==="shipped");
      const pending = orders.filter(o=>o.status==="awaiting_payment");
      const spent = paid.reduce((a,o)=>a+Number(o.total||0),0);
      document.getElementById("stOrders").textContent = orders.length;
      document.getElementById("stSpent").textContent = euro(spent);
      document.getElementById("stPending").textContent = pending.length;
    }
    async function boot(){
      await NEXUS.loadUser();
      const u = NEXUS.user;
      if(u){
        document.getElementById("userView").style.display="block";
        document.getElementById("logoutBtn").style.display="inline-flex";
        const name = u.fullName || u.email.split("@")[0];
        document.getElementById("hello").textContent = u.fullName?`Bonjour, ${u.fullName}`:"Mon compte";
        document.getElementById("userSub").textContent = "Espace personnel — commandes, paiements et suivi.";
        document.getElementById("pfAvatar").textContent = (name[0]||"N").toUpperCase();
        document.getElementById("pfName").textContent = name;
        document.getElementById("pfEmail").textContent = u.email;
        if(u.createdAt){
          document.getElementById("pfSince").textContent =
            "Membre depuis le "+new Date(u.createdAt).toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
        }
        try{
          const {orders} = await NEXUS.api("/api/orders/mine");
          renderStats(orders);
          document.getElementById("ordersList").innerHTML = orders.length
            ? orders.map(orderCard).join("")
            : '<p style="color:var(--muted)">Aucune commande pour le moment. <a href="/produits" style="color:var(--cyan)">Explorer le catalogue →</a></p>';
        }catch(e){ document.getElementById("ordersList").innerHTML = '<p style="color:#ed8585">'+e.message+'</p>'; }
      }else{
        document.getElementById("guestView").style.display="block";
        document.getElementById("openAuthBtn").addEventListener("click",()=>NEXUS.openAuth());
        window.__afterAuth = ()=>location.reload();
      }
    }
    document.getElementById("logoutBtn").addEventListener("click", async ()=>{
      await NEXUS.api("/api/auth/logout",{method:"POST"}); location.reload();
    });
    // Annulation de commande (connecté ou invité) — délégation d'événement
    document.addEventListener("click", async (e)=>{
      const b = e.target.closest(".oc-cancel");
      if(!b) return;
      const ref = b.dataset.ref;
      const email = NEXUS.user ? "" : (document.getElementById("t_email")?.value.trim() || "");
      if(!confirm(`Annuler la commande ${ref} ? Cette action est définitive.`)) return;
      b.disabled = true; b.textContent = "Annulation…";
      try{
        const url = "/api/orders/"+encodeURIComponent(ref)+"/cancel"+(email?("?email="+encodeURIComponent(email)):"");
        await NEXUS.api(url,{method:"POST"});
        location.reload();
      }catch(err){ alert(err.message); b.disabled=false; b.textContent="Annuler la commande"; }
    });
    document.getElementById("trackBtn").addEventListener("click", async ()=>{
      const msg=document.getElementById("t_msg"); msg.textContent="";
      const ref=document.getElementById("t_ref").value.trim();
      const email=document.getElementById("t_email").value.trim();
      try{
        const {order}=await NEXUS.api(`/api/orders/${encodeURIComponent(ref)}?email=${encodeURIComponent(email)}`);
        document.getElementById("trackResult").innerHTML = orderCard(order);
      }catch(e){ msg.className="form-msg err"; msg.textContent=e.message; }
    });
    document.addEventListener("DOMContentLoaded", boot);
  </script>
</body>
</html>
