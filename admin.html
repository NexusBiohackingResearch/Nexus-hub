<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin — NEXUS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/store.css">
</head>
<body>
  <header class="header">
    <a class="brand" href="index.html"><span class="brand-mark"></span><span>NEXUS</span><small>Admin</small></a>
    <div class="header-actions">
      <button class="button button-secondary" id="logoutBtn" style="min-height:auto;padding:10px 14px;font-size:11px;display:none">Déconnexion</button>
    </div>
  </header>

  <main class="page">
    <!-- Connexion admin -->
    <div id="loginView" style="display:none;max-width:420px;margin:0 auto">
      <h1>Espace admin</h1>
      <p class="lead">Réservé à la gestion des commandes NEXUS.</p>
      <div class="panel">
        <div class="field"><label>Email admin</label><input type="email" id="a_email"></div>
        <div class="field"><label>Mot de passe</label><input type="password" id="a_pass"></div>
        <p class="form-msg" id="a_msg"></p>
        <button class="button button-primary" style="width:100%" id="a_btn">Se connecter</button>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashView" style="display:none">
      <h1>Commandes</h1>
      <p class="lead">Gère les paiements et expéditions. Les emails partent automatiquement à chaque changement de statut.</p>
      <div class="admin-stats" id="stats"></div>
      <div class="admin-filters" id="filters">
        <button data-s="" class="active">Toutes</button>
        <button data-s="awaiting_payment">En attente</button>
        <button data-s="payment_received">Payées</button>
        <button data-s="shipped">Expédiées</button>
        <button data-s="cancelled">Annulées</button>
      </div>
      <div id="orders"></div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script>
    const SL={awaiting_payment:"En attente de paiement",payment_received:"Paiement reçu",shipped:"Expédiée",cancelled:"Annulée"};
    let filter="";
    function esc(s=""){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}

    async function guard(){
      await NEXUS.loadUser();
      const u = NEXUS.user;
      if(u && u.isAdmin){ showDash(); }
      else { document.getElementById("loginView").style.display="block"; }
    }
    function showDash(){
      document.getElementById("dashView").style.display="block";
      document.getElementById("loginView").style.display="none";
      document.getElementById("logoutBtn").style.display="inline-flex";
      loadStats(); loadOrders();
    }
    async function loadStats(){
      try{
        const s = await NEXUS.api("/api/admin/stats");
        document.getElementById("stats").innerHTML = `
          <div class="stat"><b>${s.awaiting||0}</b><span>En attente</span></div>
          <div class="stat"><b style="color:var(--green)">${s.paid||0}</b><span>Payées</span></div>
          <div class="stat"><b style="color:var(--cyan)">${s.shipped||0}</b><span>Expédiées</span></div>
          <div class="stat"><b>${Number(s.revenue||0).toFixed(0)} €</b><span>Encaissé</span></div>`;
      }catch(e){}
    }
    async function loadOrders(){
      const box=document.getElementById("orders");
      box.innerHTML='<p style="color:var(--muted)">Chargement…</p>';
      try{
        const {orders} = await NEXUS.api("/api/admin/orders"+(filter?`?status=${filter}`:""));
        if(!orders.length){box.innerHTML='<p style="color:var(--muted)">Aucune commande.</p>';return;}
        box.innerHTML = orders.map(renderOrder).join("");
        box.querySelectorAll("[data-act]").forEach(b=>b.addEventListener("click",()=>act(b)));
      }catch(e){ box.innerHTML='<p style="color:#ed8585">'+esc(e.message)+'</p>'; }
    }
    function renderOrder(o){
      const items=(o.items||[]).map(i=>`${esc(i.name)} × ${i.quantity}`).join(" · ");
      const actions = [];
      if(o.status==="awaiting_payment"){
        actions.push(`<button class="primary" data-act="payment_received" data-id="${o.id}">✓ Paiement reçu</button>`);
        actions.push(`<button data-act="cancelled" data-id="${o.id}">Annuler</button>`);
      }else if(o.status==="payment_received"){
        actions.push(`<button class="primary" data-act="shipped" data-id="${o.id}" data-track="1">📦 Marquer expédiée</button>`);
      }
      return `<div class="admin-order">
        <div class="ao-head">
          <div><span class="ref" style="font-family:'Space Grotesk';font-weight:700">${o.reference}</span>
          &nbsp;<span class="status-pill status-${o.status}">${SL[o.status]||o.status}</span></div>
          <b style="font-family:'Space Grotesk';font-size:18px">${Number(o.total).toFixed(2)} €</b>
        </div>
        <div class="ao-meta">
          👤 ${esc(o.full_name||"—")} · ✉️ ${esc(o.email)} ${o.phone?"· 📞 "+esc(o.phone):""}<br>
          ${o.shipping_address?"📍 "+esc(o.shipping_address)+" "+esc(o.country||""):""}<br>
          🧬 ${items}<br>
          <span style="color:#66757f">${new Date(o.created_at).toLocaleString("fr-FR")} · ${esc(o.payment_method)}</span>
          ${o.note?`<br>📝 ${esc(o.note)}`:""}
        </div>
        ${actions.length?`<div class="ao-actions">${actions.join("")}</div>`:'<div style="font-size:12px;color:#66757f">Aucune action.</div>'}
      </div>`;
    }
    async function act(btn){
      const id=btn.dataset.id, status=btn.dataset.act;
      let tracking=null;
      if(btn.dataset.track){ tracking = prompt("Numéro de suivi (optionnel) :")||null; }
      btn.textContent="…";
      try{
        await NEXUS.api(`/api/admin/orders/${id}/status`,{method:"POST",body:{status,tracking}});
        loadStats(); loadOrders();
      }catch(e){ alert(e.message); }
    }
    document.getElementById("a_btn").addEventListener("click", async ()=>{
      const msg=document.getElementById("a_msg"); msg.textContent="";
      try{
        await NEXUS.api("/api/auth/login",{method:"POST",body:{email:document.getElementById("a_email").value.trim(),password:document.getElementById("a_pass").value}});
        await NEXUS.loadUser();
        if(NEXUS.user?.isAdmin) showDash();
        else { msg.className="form-msg err"; msg.textContent="Ce compte n'est pas admin."; }
      }catch(e){ msg.className="form-msg err"; msg.textContent=e.message; }
    });
    document.getElementById("logoutBtn").addEventListener("click", async ()=>{ await NEXUS.api("/api/auth/logout",{method:"POST"}); location.reload(); });
    document.getElementById("filters").addEventListener("click", e=>{
      const b=e.target.closest("button"); if(!b)return;
      document.querySelectorAll("#filters button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active"); filter=b.dataset.s; loadOrders();
    });
    document.addEventListener("DOMContentLoaded", guard);
  </script>
</body>
</html>
